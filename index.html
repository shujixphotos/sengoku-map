<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#141b26">
<title>戦国時代 勢力変遷マップ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <h1 class="brand">
    <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true"><g fill="currentColor">
      <circle cx="50" cy="50" r="13"/><circle cx="50" cy="20" r="11"/><circle cx="79" cy="41" r="11"/>
      <circle cx="68" cy="76" r="11"/><circle cx="32" cy="76" r="11"/><circle cx="21" cy="41" r="11"/>
    </g></svg>
    戦国時代 勢力変遷マップ
  </h1>
  <div class="topbar-actions">
    <button id="btn-legend" class="tbtn" type="button">勢力一覧</button>
    <button id="btn-help" class="tbtn" type="button">使い方</button>
  </div>
</header>

<div class="yearbar">
  <div class="yearbar-inner">
    <button id="btn-prev" class="ybtn" type="button" aria-label="前の年代へ">‹</button>
    <div class="yearcore">
      <div class="year-head"><span id="year-big">1575</span><span class="year-unit">年</span></div>
      <input id="year-range" type="range" aria-label="年代を選ぶ">
      <div id="year-ticks" class="ticks"></div>
      <div id="year-note" class="year-note"></div>
    </div>
    <button id="btn-next" class="ybtn" type="button" aria-label="次の年代へ">›</button>
  </div>
</div>

<main class="stage">

  <aside class="legend" id="legend">
    <h2>勢力一覧<small>この年代の主要大名</small></h2>
    <div id="legend-list" class="legend-list"></div>
    <p class="legend-foot">地図をタップすると詳細を表示します</p>
  </aside>

  <div class="mapwrap" id="mapwrap">
    <svg id="map" viewBox="0 0 1000 830" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="sea" cx="50%" cy="45%" r="75%">
          <stop offset="0%" stop-color="#20364d"/>
          <stop offset="60%" stop-color="#152435"/>
          <stop offset="100%" stop-color="#0d1725"/>
        </radialGradient>
        <pattern id="wave" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M0 30 Q15 20 30 30 T60 30" fill="none" stroke="#7fa8c9" stroke-width="1" opacity="0.14"/>
          <path d="M0 52 Q15 42 30 52 T60 52" fill="none" stroke="#7fa8c9" stroke-width="1" opacity="0.08"/>
        </pattern>
        <pattern id="washi" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="none"/>
          <circle cx="3" cy="4" r="0.7" fill="#3a2c1a" opacity="0.16"/>
          <circle cx="10" cy="9" r="0.6" fill="#3a2c1a" opacity="0.13"/>
          <path d="M0 13 H14" stroke="#3a2c1a" stroke-width="0.4" opacity="0.07"/>
        </pattern>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffe08a" flood-opacity="0.95"/>
        </filter>
        <clipPath id="landclip"><use href="#coast"/></clipPath>
      </defs>

      <rect class="sea" x="-2000" y="-2000" width="5000" height="5000" fill="url(#sea)"/>
      <rect class="sea-wave" x="-2000" y="-2000" width="5000" height="5000" fill="url(#wave)"/>
      <g class="clouds" fill="#c9a227" opacity="0.09">
        <path d="M60 90 q60-40 140-20 q70 18 130-6 q-40 60-140 54 q-90-6-130-28Z"/>
        <path d="M600 700 q70-46 160-22 q80 22 150-8 q-46 68-160 60 q-100-8-150-30Z"/>
      </g>

      <g id="world">
        <path id="ezo" class="ezo"/>
        <g id="provinces"></g>
        <rect x="0" y="0" width="1000" height="830" fill="url(#washi)" clip-path="url(#landclip)" pointer-events="none"/>
        <g id="clan-edges"></g>
        <path id="coast" class="coast"/>
      </g>
    </svg>

    <div id="overlay" class="overlay"></div>

    <div class="hint">地図をドラッグして移動／ピンチイン・アウトで拡大縮小</div>

    <div class="zoomctl">
      <button id="btn-reset" class="zbtn" type="button" aria-label="全体表示に戻す">全体</button>
      <button id="btn-zoom-out" class="zbtn" type="button" aria-label="縮小">−</button>
      <button id="btn-zoom-in" class="zbtn" type="button" aria-label="拡大">＋</button>
    </div>
  </div>

  <aside class="panel" id="panel">
    <button id="sheet-handle" class="sheet-handle" type="button" aria-label="詳細を閉じる"></button>
    <div class="panel-head">
      <div id="panel-title" class="panel-title"><span class="ph">勢力の詳細</span></div>
      <button id="panel-close" class="panel-close" type="button" aria-label="閉じる">×</button>
    </div>
    <div id="panel-body" class="panel-body"></div>
  </aside>

</main>

<dialog id="help">
  <h3>使い方</h3>
  <ul>
    <li>上部のスライダーで年代を切り替えると、勢力範囲・当主・出来事が変わります。</li>
    <li>地図の色のついた領域をタップすると、その勢力の詳細が開きます。</li>
    <li>ドラッグで移動、ピンチまたはダブルタップで拡大できます。</li>
    <li>「全体」ボタンで最初の表示に戻ります。</li>
  </ul>
  <p class="note">勢力範囲は旧国（甲斐・信濃など）単位で管理した簡略表示です。国境や実効支配は史実と厳密には一致しません。</p>
  <button id="help-close" type="button">閉じる</button>
</dialog>

<script src="js/geo.js"></script>
<script src="js/kamon.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
